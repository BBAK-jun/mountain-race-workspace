services:
  - type: web
    name: mountain-race-api
    runtime: docker
    region: singapore
    plan: starter
    autoDeployTrigger: off
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/api/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - tsconfig.base.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
